services:
  postgres:
    image: postgres:16-alpine
    container_name: calendar-app-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: calendar_app
      POSTGRES_USER: calendar_user
      # Definir en .env local o en el servidor; valor por defecto solo para desarrollo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calendar_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_user -d calendar_app"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
